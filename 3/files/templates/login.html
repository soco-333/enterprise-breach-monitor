<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breach Monitor // Login</title>
<style>
  :root {
    --bg: #0a0e0a;
    --panel: #0f1510;
    --green: #39ff88;
    --dim: #5c7f65;
    --red: #ff4d4d;
    --border: #1c2b1f;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--green);
    font-family: "Courier New", monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 2.5rem;
    width: 340px;
    box-shadow: 0 0 25px rgba(57,255,136,0.08);
  }
  .panel h1 {
    font-size: 1rem;
    letter-spacing: 2px;
    margin: 0 0 1.5rem;
    color: var(--green);
  }
  .panel h1::before { content: "$ "; color: var(--dim); }
  label {
    display: block;
    font-size: 0.75rem;
    color: var(--dim);
    margin-bottom: 0.3rem;
  }
  input {
    width: 100%;
    background: #050705;
    border: 1px solid var(--border);
    color: var(--green);
    padding: 0.6rem;
    margin-bottom: 1.1rem;
    font-family: inherit;
  }
  input:focus { outline: 1px solid var(--green); }
  button {
    width: 100%;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 0.6rem;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
  }
  button:hover { background: var(--green); color: #000; }
  .flash {
    color: var(--red);
    font-size: 0.8rem;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>
  <div class="panel">
    <h1>ACCESS_TERMINAL</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash">// {{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST">
      <label>username</label>
      <input type="text" name="username" required autofocus>
      <label>password</label>
      <input type="password" name="password" required>
      <button type="submit">connect &gt;</button>
    </form>
  </div>
</body>
</html>
